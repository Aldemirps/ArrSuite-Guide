# Surfshark WireGuard Configuration Template
# 
# INSTRUCTIONS:
# 1. Get your config from: https://my.surfshark.com/
# 2. Navigate to: VPN → Manual Setup → WireGuard
# 3. Generate credentials and download config
# 4. Copy this template and replace YOUR_PRIVATE_KEY with actual key
# 5. Choose your preferred server location
