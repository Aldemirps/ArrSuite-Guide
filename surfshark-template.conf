[Interface]
Address = 10.14.0.2/16
PrivateKey = YOUR_PRIVATE_KEY_HERE
DNS = 162.252.172.57, 149.154.159.92

[Peer]
PublicKey = SURFSHARK_SERVER_PUBLIC_KEY
AllowedIPs = 0.0.0.0/0
Endpoint = SERVER_LOCATION.prod.surfshark.com:51820

